<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign in — Exposé</title>
<link rel="stylesheet" href="css/variables.css"/>
<link rel="stylesheet" href="css/base.css"/>
<link rel="stylesheet" href="css/components.css"/>
<link rel="stylesheet" href="css/nav.css"/>
<link rel="stylesheet" href="css/auth.css"/>
</head>
<body class="dot-bg">

<nav class="topnav">
  <a class="topnav-brand" href="index.html">
    <div class="topnav-mark">
      <svg viewBox="0 0 15 15" fill="none" stroke="#F8F6F1" stroke-width="1.5" stroke-linecap="round">
        <circle cx="7.5" cy="7.5" r="5.5"/><circle cx="7.5" cy="7.5" r="2"/>
        <line x1="7.5" y1="2"   x2="7.5" y2="5.5"/><line x1="7.5" y1="9.5" x2="7.5" y2="13"/>
        <line x1="2"   y1="7.5" x2="5.5" y2="7.5"/><line x1="9.5" y1="7.5" x2="13"  y2="7.5"/>
      </svg>
    </div>
    <span class="topnav-name">EXPOSÉ</span>
  </a>
  <div class="topnav-right">
    <button class="topnav-theme" onclick="Theme.toggle()">
      <svg class="theme-icon-sun" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="6.5" cy="6.5" r="2.2"/>
        <line x1="6.5" y1="1" x2="6.5" y2="2.4"/><line x1="6.5" y1="10.6" x2="6.5" y2="12"/>
        <line x1="1" y1="6.5" x2="2.4" y2="6.5"/><line x1="10.6" y1="6.5" x2="12" y2="6.5"/>
      </svg>
      <svg class="theme-icon-moon" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M11 8.5A5 5 0 0 1 4.5 2 5 5 0 1 0 11 8.5z"/>
      </svg>
    </button>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">
        <svg viewBox="0 0 22 22" fill="none" stroke="#F8F6F1" stroke-width="1.6" stroke-linecap="round">
          <circle cx="11" cy="11" r="9"/><circle cx="11" cy="11" r="3.5"/>
          <line x1="11" y1="2"   x2="11" y2="7.5"/><line x1="11" y1="14.5" x2="11" y2="20"/>
          <line x1="2"  y1="11" x2="7.5" y2="11"/><line x1="14.5" y1="11" x2="20" y2="11"/>
        </svg>
      </div>
      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to your Exposé account</div>
    </div>

    <div class="alert alert-error" id="login-error">
      <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="7" cy="7" r="5.5"/>
        <line x1="7" y1="4.5" x2="7" y2="7.5"/>
        <circle cx="7" cy="9.5" r="0.5" fill="currentColor"/>
      </svg>
      <span id="login-error-msg"></span>
    </div>

    <div class="form-group">
      <label class="form-label">Email address</label>
      <input class="input" type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrap">
        <input class="input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        <button class="pw-toggle" id="pw-toggle" type="button" onclick="togglePw()">
          <svg class="eye-open" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 7s2.5-4.5 6-4.5S13 7 13 7s-2.5 4.5-6 4.5S1 7 1 7z"/>
            <circle cx="7" cy="7" r="1.8"/>
          </svg>
          <svg class="eye-closed" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 2l10 10M5.5 5.7A1.8 1.8 0 0 0 8.3 8.5M4 4.3C2.5 5.2 1 7 1 7s2.5 4.5 6 4.5c1.2 0 2.3-.3 3.2-.9M10.5 10C12 9 13 7 13 7s-2.5-4.5-6-4.5c-.7 0-1.4.1-2 .3"/>
          </svg>
        </button>
      </div>
    </div>

    <button class="btn btn-primary btn-md" style="width:100%;margin-top:4px" id="login-btn" onclick="handleLogin()">
      <div class="spinner"></div>
      <span class="btn-label">Sign in</span>
    </button>

    <div class="auth-switch">
      Don't have an account? <a href="signup.html">Create one free</a>
    </div>
  </div>
</div>

<script src="js/auth.service.js"></script>
<script src="js/utils.js"></script>
<script>
Theme.init();
Router.requireGuest();

function togglePw() {
  const input  = document.getElementById('password');
  const toggle = document.getElementById('pw-toggle');
  input.type   = input.type === 'password' ? 'text' : 'password';
  toggle.classList.toggle('shown');
}

async function handleLogin() {
  const email    = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('login-btn');
  const errBox   = document.getElementById('login-error');
  const errMsg   = document.getElementById('login-error-msg');

  errBox.classList.remove('visible');
  btn.classList.add('loading'); btn.disabled = true;

  const result = await AuthService.login(email, password);

  btn.classList.remove('loading'); btn.disabled = false;

  if (result.success) {
    window.location.replace('dashboard.html');
  } else {
    errMsg.textContent = result.error;
    errBox.classList.add('visible');
    const emailInput = document.getElementById('email');
    const pwInput    = document.getElementById('password');
    emailInput.classList.toggle('error', result.error.includes('email') || result.error.includes('No account'));
    pwInput.classList.toggle('error', result.error.includes('password') || result.error.includes('Incorrect'));
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>
</html>
